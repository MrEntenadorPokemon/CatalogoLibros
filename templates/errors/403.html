{% extends "base.html" %}

{% block title %}Acceso Denegado (403){% endblock %}

{% block content %}
<div class="row min-vh-75 align-items-center justify-content-center text-center py-5">
    <div class="col-12 col-md-6">
        <div class="mb-4">
            <i class="bi bi-shield-lock display-1 text-danger opacity-25"></i>
        </div>
        <h1 class="display-1 fw-bold text-danger">403</h1>
        <h2 class="h3 mb-4">Acceso Restringido</h2>
        <p class="text-muted mb-5">Lo sentimos, no tienes los permisos necesarios para acceder a esta sección de la biblioteca.</p>
        <div class="d-grid gap-3 d-md-flex justify-content-center">
            <a href="{{ url_for('catalog') }}" class="btn btn-primary-custom px-4 py-2 fw-bold">
                <i class="bi bi-house me-2"></i> Ir al Inicio
            </a>
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary px-4 py-2">
                Iniciar Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
