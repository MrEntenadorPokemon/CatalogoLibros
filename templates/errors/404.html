{% extends "base.html" %}

{% block title %}Página no encontrada (404){% endblock %}

{% block content %}
<div class="row min-vh-75 align-items-center justify-content-center text-center py-5">
    <div class="col-12 col-md-6">
        <div class="mb-4">
            <i class="bi bi-question-circle display-1 text-muted opacity-25"></i>
        </div>
        <h1 class="display-1 fw-bold text-primary-custom">404</h1>
        <h2 class="h3 mb-4">¡Vaya! Página no encontrada</h2>

            <a href="{{ url_for('catalog') }}" class="btn btn-primary-custom px-4 py-2 fw-bold">
                <i class="bi bi-search me-2"></i> Explorar Catálogo
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 py-2">
                Volver atrás
